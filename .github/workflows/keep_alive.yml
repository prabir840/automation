name: Keep Supabase Alive
on:
  schedule:
    # Run twice a day (every 12 hours at 00:00 and 12:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allow manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          # This curl command sends a request to your Supabase REST API.
          # It fetches 1 row from a table to register as project activity.
          # NOTE: If you don't have a 'users' table, change 'users' below to a table that exists.
          curl -s "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/user?limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
